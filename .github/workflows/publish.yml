name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up npm trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($package_version)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality checks
        run: bun run check

      - name: Build tarball
        run: |
          mkdir -p .release-artifacts
          bun pm pack --destination .release-artifacts --quiet
          package_file="$(find .release-artifacts -maxdepth 1 -name '*.tgz' -print | head -n 1)"
          if [ -z "$package_file" ]; then
            echo "No package tarball was created." >&2
            exit 1
          fi
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"

      - name: Store package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ${{ env.PACKAGE_FILE }}

      - name: Publish to npm
        run: npm publish "${PACKAGE_FILE}" --provenance --access public
